name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: postgres
          POSTGRES_DB: voyager_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter voyager-server run migrate:up
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/voyager_test
      - run: pnpm --dir web-client exec playwright install --with-deps chromium
      - run: pnpm test:e2e
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/voyager_test
          REDIS_URL: redis://localhost:6379
          E2E_MOCK_TOOLS: '1'
          # E2E_MOCK_ANTHROPIC=1 swaps the real SDK for the
          # MockAnthropicClient stub so this workflow needs no
          # API key and burns no tokens. The nightly real-API
          # workflow leaves this unset.
          E2E_MOCK_ANTHROPIC: '1'
          E2E_BYPASS_RATE_LIMITS: '1'
          # Override the legacy localhost:5173 (Vite) default in
          # corsConfig so the Next.js dev server on :3000 can call
          # the API on :3001.
          CORS_ORIGIN: 'http://localhost:3000'
          NODE_ENV: test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
