name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # SEC-02 / ENG-06 (2026-04-06 audit): fail the build on any
      # production dependency with a high-severity CVE. Moderates
      # still warn in the audit output but do not fail the job;
      # promote to also failing on moderates once the baseline is
      # clean for two weeks.
      - name: pnpm audit (production dependencies, high and above)
        run: pnpm audit --prod --audit-level high

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Build
        run: pnpm --filter voyager-server build

      - name: Run migrations
        run: pnpm --filter voyager-server run migrate:up
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test

      - name: Unit tests with coverage
        run: pnpm test:coverage
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          SESSION_SECRET: test-secret
          CSRF_SECRET: test-csrf-secret
          ANTHROPIC_API_KEY: sk-ant-test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: server/coverage/
          retention-days: 14

      - name: Integration tests
        run: pnpm --filter voyager-server run test:integration
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          SESSION_SECRET: test-secret
          ANTHROPIC_API_KEY: sk-ant-test
